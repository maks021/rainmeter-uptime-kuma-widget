[Rainmeter]
Update=1000
Background=#@#Background.png
BackgroundMode=3
BackgroundMargins=0,34,0,14
DynamicWindowSize=1
AccurateText=1

[Metadata]
Name=Kuma
Author=Custom
Information=Shows Uptime Kuma service status.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
fontName=Trebuchet MS
textSize=8
titleSize=10
colorText=255,255,255,205
panelWidth=190

[MeasureKuma]
Measure=Script
ScriptFile=#CURRENTPATH#KumaReader.lua

[styleTitle]
StringAlign=Center
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#colorText#
FontFace=#fontName#
FontSize=#titleSize#
AntiAlias=1
ClipString=1

[styleLeftText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#colorText#
FontFace=#fontName#
FontSize=#textSize#
AntiAlias=1
ClipString=1

[styleMonoText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#colorText#
FontFace=Consolas
FontSize=10
AntiAlias=1
ClipString=1

[styleSeperator]
SolidColor=255,255,255,15

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=100
Y=12
W=190
H=18
Text=Uptime Kuma

[meterSeperator]
Meter=Image
MeterStyle=styleSeperator
X=10
Y=30
W=190
H=1

[meterBody]
Meter=String
MeterStyle=styleMonoText
MeasureName=MeasureKuma
X=10
Y=40
W=190
H=160
Text=%1
DynamicVariables=1
InlineSetting=Color | 120,255,120,255
InlinePattern=OK
InlineSetting2=Color | 255,120,120,255
InlinePattern2=DOWN
InlineSetting3=Color | 255,220,120,255
InlinePattern3=WAIT
IfMatch=DOWN
IfMatchAction=[!SetOption meterTitle FontColor "255,80,80,255"]
IfNotMatchAction=[!SetOption meterTitle FontColor "#colorText#"]
DynamicVariables=1